name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: >-
          node --test
          dist/test/auth.test.js
          dist/test/config.test.js
          dist/test/downloader.test.js
          dist/test/event-bus.test.js
          dist/test/json.test.js
          dist/test/mcp-http.test.js
          dist/test/runtime.test.js
          dist/test/tunnel.test.js
          dist/test/utils.test.js

      - name: Integration tests
        run: node --test dist/test/integration.test.js
